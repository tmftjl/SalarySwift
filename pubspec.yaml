name: salary_swift
description: A simple local payroll recording app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # 状态管理
  flutter_riverpod: ^2.5.0

  # PDF 生成与分享
  pdf: ^3.10.0
  share_plus: ^9.0.0

  # 工具
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  drift_dev: ^2.18.0
  build_runner: ^2.4.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/SimHei.ttf
